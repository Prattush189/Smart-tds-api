; =============================================================================
; PgBouncer — SmartTds transaction-pooling layer (Phase 4)
; -----------------------------------------------------------------------------
; Sits between the API nodes and HAProxy's RW port (which always reaches the
; current Patroni leader). Absorbs the quarterly TDS-deadline "login storm":
; thousands of short client connections collapse onto a small set of real
; PostgreSQL backends, keeping max_connections (200) safe.
;
; IMPORTANT — PgBouncer pools PER (user, database) pair.
;   default_pool_size is therefore applied to EACH (user,db) combination, not
;   globally. With ~5 app users hitting smarttds26, that user/db pair gets up to
;   25 server connections; a different year DB gets its own 25, etc. Budget the
;   sum of all active (user,db) pools against Postgres max_connections=200.
; =============================================================================

[databases]
; ---- Per-year assessment databases (the hot path; firms share these) --------
; Bigger pools — these carry the bulk of transactional TDS work near deadlines.
smarttds26 = host=haproxy port=5000 dbname=smarttds26 pool_size=25
smarttds25 = host=haproxy port=5000 dbname=smarttds25 pool_size=25
smarttds24 = host=haproxy port=5000 dbname=smarttds24 pool_size=15   ; older year, lighter
smarttds23 = host=haproxy port=5000 dbname=smarttds23 pool_size=10   ; archive-ish

; ---- Shared master DB (logins, assessees, lookups) --------------------------
; Smaller pool: queries are short/cached, but every request touches it, so keep
; it responsive rather than large.
masterdbtds = host=haproxy port=5000 dbname=masterdbtds pool_size=10

; ---- OPTIONAL read-only alias routed to replicas (port 5001) -----------------
; Point heavy reports here in the app to offload the primary. Same physical DB,
; different HAProxy listener.
smarttds26_ro = host=haproxy port=5001 dbname=smarttds26 pool_size=15

; New assessment years: add a line + provision the DB, then RELOAD pgbouncer.
; (A wildcard "* = host=haproxy port=5000" works too but loses per-db sizing.)

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; ---- Authentication ----------------------------------------------------------
auth_type = scram-sha-256
auth_file = /opt/bitnami/pgbouncer/conf/userlist.txt   ; see userlist.txt.example
; Admins who may issue PgBouncer console commands (SHOW POOLS, RELOAD, PAUSE):
admin_users = pgb_admin
stats_users = pgb_stats, monitoring

; ---- Pooling mode ------------------------------------------------------------
; transaction = a server connection is returned to the pool at COMMIT/ROLLBACK.
; Best multiplexing for short web requests. NOTE for the app team: prepared
; statements / session-level features need care — Npgsql works well in tx mode
; when "No Reset On Close" + server-side prepare are configured appropriately,
; and we set Pooling=false on the Npgsql side so PgBouncer owns pooling.
pool_mode = transaction

; ---- Sizing ------------------------------------------------------------------
; max_client_conn: ceiling on inbound client sockets across ALL (user,db) pools.
; Set HIGH to swallow deadline login storms without refusing connections.
max_client_conn = 1000

; Fallback pool size when a [databases] line omits pool_size.
default_pool_size = 25

; Extra server conns PgBouncer may open transiently under burst, per pool.
reserve_pool_size = 5
reserve_pool_timeout = 3

; Hard cap on total server connections to ONE database (sum of all users).
; Guards Postgres: keep (sum of per-db caps) comfortably under max_connections.
max_db_connections = 60
; Cap per (user) across all DBs.
max_user_connections = 80

; Keep a few warm idle server conns so the first deadline request isn't slow.
min_pool_size = 5

; ---- Timeouts ----------------------------------------------------------------
server_idle_timeout = 600        ; close idle server conns after 10 min
server_lifetime = 3600           ; recycle a server conn after 1 h (picks up failover)
query_wait_timeout = 120         ; client waits max 2 min for a free server conn
client_idle_timeout = 0          ; don't disconnect idle clients (Npgsql keepalive)
server_connect_timeout = 15

; ---- TLS to clients (API -> PgBouncer). Enable in production. ----------------
;client_tls_sslmode = require
;client_tls_cert_file = /etc/pgbouncer/tls/server.crt
;client_tls_key_file  = /etc/pgbouncer/tls/server.key
; ---- TLS to upstream (PgBouncer -> HAProxy/Postgres) -------------------------
;server_tls_sslmode = verify-full
;server_tls_ca_file = /etc/pgbouncer/tls/ca.crt

; ---- Logging / health --------------------------------------------------------
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
; "SHOW POOLS;" on the admin console (psql -p 6432 pgbouncer) is the live view
; the monitoring/ docs alert on (cl_waiting > 0 sustained => pool exhaustion).

ignore_startup_parameters = extra_float_digits,search_path

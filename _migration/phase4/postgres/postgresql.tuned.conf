# =============================================================================
# postgresql.tuned.conf — SmartTds PostgreSQL 16 tuning
# -----------------------------------------------------------------------------
# PRIMARY TARGET: 8 vCPU / 32 GB RAM / NVMe SSD (primary AND standby identical).
# Include from postgresql.conf:   include 'postgresql.tuned.conf'
# (Under Patroni, the authoritative copy of most of these lives in the DCS via
#  patroni-node*.yml `bootstrap.dcs.postgresql.parameters`; this file is the
#  human-readable reference and the source for non-Patroni installs / the VPS.)
# -----------------------------------------------------------------------------
# A "SMALL VPS (4c / 8 GB)" override block is at the BOTTOM — uncomment it to
# run the staging box; it must come AFTER these lines to win.
# =============================================================================

# ---------------------------------------------------------------------------
# CONNECTIONS
# ---------------------------------------------------------------------------
max_connections = 200            # real backends are kept low by PgBouncer pooling
superuser_reserved_connections = 5

# ---------------------------------------------------------------------------
# MEMORY  (8 vCPU / 32 GB)
# ---------------------------------------------------------------------------
shared_buffers = 8GB             # ~25% RAM
effective_cache_size = 24GB      # ~75% RAM: planner's view of OS+PG cache
work_mem = 16MB                  # per sort/hash node; watch (max_conn * complexity)
maintenance_work_mem = 1GB       # VACUUM / CREATE INDEX / bulk loads
huge_pages = try                 # use Linux hugepages for shared_buffers if available
# autovacuum gets its own budget so big maintenance doesn't starve it:
autovacuum_work_mem = 256MB

# ---------------------------------------------------------------------------
# WAL / REPLICATION  (HA + zero-data-loss)
# ---------------------------------------------------------------------------
wal_level = replica
synchronous_commit = on          # durable; with Patroni synchronous_mode => RPO 0
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 2048MB
hot_standby = on                 # standby serves read-only queries (HAProxy :5001)
hot_standby_feedback = on        # standby reports xmin so primary delays vacuuming
                                 # rows it still needs (prevents query cancellations)
wal_log_hints = on               # REQUIRED for pg_rewind after failover
wal_compression = on             # smaller WAL -> less network/disk during bursts
max_standby_streaming_delay = 30s

# ---------------------------------------------------------------------------
# ARCHIVING  (PITR — see backup/pgbackrest.conf)
# ---------------------------------------------------------------------------
archive_mode = on
archive_command = 'pgbackrest --stanza=smarttds archive-push %p'
# Fallback (if not using pgBackRest): plain copy to an archive dir
# archive_command = 'test ! -f /var/lib/pgsql/wal_archive/%f && cp %p /var/lib/pgsql/wal_archive/%f'

# ---------------------------------------------------------------------------
# CHECKPOINTS  (smooth IO; avoid stalls during quarterly write storms)
# ---------------------------------------------------------------------------
checkpoint_completion_target = 0.9
max_wal_size = 8GB
min_wal_size = 2GB
checkpoint_timeout = 15min

# ---------------------------------------------------------------------------
# PLANNER / STORAGE (NVMe)
# ---------------------------------------------------------------------------
random_page_cost = 1.1           # NVMe: random ~ sequential
effective_io_concurrency = 200   # NVMe can service many concurrent IOs
default_statistics_target = 100

# ---------------------------------------------------------------------------
# PARALLELISM (8 cores)
# ---------------------------------------------------------------------------
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# ---------------------------------------------------------------------------
# AUTOVACUUM  (TDS data churns near deadlines — keep it aggressive)
# ---------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05    # vacuum after 5% of table changes
autovacuum_analyze_scale_factor = 0.02

# ---------------------------------------------------------------------------
# OBSERVABILITY  (feeds monitoring/README.md)
# ---------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
track_io_timing = on
track_functions = pl
log_min_duration_statement = 1000        # log statements slower than 1s
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0                        # log any spill to temp (work_mem too small)
log_autovacuum_min_duration = 0
log_line_prefix = '%m [%p] %q%u@%d '

# ---------------------------------------------------------------------------
# TIMEOUTS  (don't let a stuck client hold locks forever)
# ---------------------------------------------------------------------------
idle_in_transaction_session_timeout = 300s    # 5 min
statement_timeout = 0                          # set per-role/app if needed
lock_timeout = 0
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6

# =============================================================================
# ============  SMALL VPS OVERRIDE — staging 4 vCPU / 8 GB  ====================
# =============================================================================
# Uncomment this WHOLE block on the aaPanel staging box (~5-10 users). Because
# it appears later in the file it overrides the production values above. Keep
# the HA/WAL settings even here so staging behaves like prod for testing.
# -----------------------------------------------------------------------------
# max_connections = 100
# shared_buffers = 1GB              # ~25% of 8 GB (smaller because aaPanel/PHP also run)
# effective_cache_size = 4GB        # ~50% (leave headroom for aaPanel stack)
# work_mem = 8MB
# maintenance_work_mem = 256MB
# huge_pages = off
# autovacuum_work_mem = 64MB
# max_wal_size = 2GB
# min_wal_size = 512MB
# max_worker_processes = 4
# max_parallel_workers = 4
# max_parallel_workers_per_gather = 2
# max_parallel_maintenance_workers = 2
# effective_io_concurrency = 200    # keep if VPS disk is SSD/NVMe; set 2 for spinning
# autovacuum_max_workers = 2
# wal_compression = on
# =============================================================================

# =============================================================================
# HAProxy — SmartTds front door (Phase 4)
# -----------------------------------------------------------------------------
# Three responsibilities:
#   1. :8080  HTTP  -> load-balance the two stateless ASP.NET Core API nodes,
#                      health-checked on GET /health.
#   2. :5000  TCP   -> PostgreSQL READ/WRITE: forward ONLY to the current Patroni
#                      leader. We discover the leader by polling each node's
#                      Patroni REST API on :8008 — the leader returns HTTP 200
#                      on GET /leader, replicas return 503. So a node is "UP" for
#                      this backend only while it IS the leader => automatic,
#                      no reconfig needed on failover.
#   3. :5001  TCP   -> PostgreSQL READ-ONLY: forward to any replica. Patroni's
#                      GET /replica returns 200 only on a healthy hot standby.
#
# In production run TWO HAProxy instances behind a keepalived VIP so HAProxy is
# itself not a single point of failure.
# =============================================================================

global
    log stdout format raw local0
    maxconn 4000
    # tune.ssl.default-dh-param 2048   # if terminating TLS here

defaults
    log     global
    mode    tcp
    option  tcplog
    retries 3
    timeout connect 5s
    timeout client  60m      # long: Postgres sessions can be idle between txns
    timeout server  60m
    timeout check   5s

# -----------------------------------------------------------------------------
# Stats / dashboard — http://<haproxy>:7000/  (lock down or auth in prod)
# -----------------------------------------------------------------------------
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    # stats auth admin:CHANGE_ME_stats

# =============================================================================
# 1) API HTTP front  (:8080)
# =============================================================================
frontend api_front
    mode http
    bind *:8080
    option httplog
    default_backend api_nodes

backend api_nodes
    mode http
    balance roundrobin
    option httpchk
    http-check send meth GET uri /health ver HTTP/1.1 hdr Host smarttds
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 maxconn 500
    server api1 api1:8080 check
    server api2 api2:8080 check
    # Production with discrete VMs instead of compose service names:
    # server api1 10.0.0.31:8080 check
    # server api2 10.0.0.32:8080 check

# =============================================================================
# 2) PostgreSQL READ/WRITE  (:5000)  -> current Patroni LEADER only
# -----------------------------------------------------------------------------
# The HTTP health check hits Patroni REST :8008 GET /leader.
#   200 => this node is the leader  -> server marked UP   -> receives traffic
#   503 => this node is a replica   -> server marked DOWN -> no traffic
# On failover Patroni flips which node answers 200, so writes follow the leader
# with zero HAProxy reconfiguration. PgBouncer points its upstreams here.
# =============================================================================
listen postgres_write
    bind *:5000
    mode tcp
    option httpchk GET /leader
    http-check expect status 200
    # PostgreSQL data flows over TCP; only the *check* is HTTP against :8008.
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg1 10.0.0.11:5432 check port 8008
    server pg2 10.0.0.12:5432 check port 8008
    # Local compose equivalent (uncomment for docker-compose.ha.yml):
    # server pg1 patroni1:5432 check port 8008
    # server pg2 patroni2:5432 check port 8008

# =============================================================================
# 3) PostgreSQL READ-ONLY  (:5001)  -> healthy REPLICAS
# -----------------------------------------------------------------------------
# GET /replica returns 200 only on a hot standby that is streaming & not lagging
# past Patroni's threshold. Round-robin across whatever replicas exist. With a
# single standby this naturally yields one read target; it scales as you add
# standbys. Point reporting / heavy SELECTs at this listener (or the *_ro
# PgBouncer alias) to spare the primary during deadline crunch.
# =============================================================================
listen postgres_read
    bind *:5001
    mode tcp
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg1 10.0.0.11:5432 check port 8008
    server pg2 10.0.0.12:5432 check port 8008
    # Local compose equivalent:
    # server pg1 patroni1:5432 check port 8008
    # server pg2 patroni2:5432 check port 8008

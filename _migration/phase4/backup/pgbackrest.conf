# =============================================================================
# pgBackRest configuration — SmartTds PostgreSQL 16 HA (Phase 4)
# Deploy at /etc/pgbackrest/pgbackrest.conf  (chmod 640, owned by postgres)
# -----------------------------------------------------------------------------
# pgBackRest gives us: parallel full + differential + incremental backups,
# continuous WAL archiving (driven by archive_command in postgresql.tuned.conf),
# point-in-time recovery (PITR), and off-site repository storage.
#
# Stanza name = "smarttds" (must match --stanza=smarttds everywhere, including
# the archive_command). One stanza covers the WHOLE cluster, so ALL databases
# (masterdbtds + every smarttdsNN year DB) are backed up together and PITR is
# cluster-wide and transactionally consistent.
#
# Run backups from the STANDBY where possible (backup-standby=y) to offload the
# primary during deadline crunch.
# =============================================================================

[global]
# --- Repository 1: LOCAL/NAS fast repo (recent restores, retention short) ----
repo1-path=/var/lib/pgbackrest
repo1-retention-full=2                 # keep 2 most-recent full backups locally
repo1-retention-diff=6                 # keep 6 differentials locally
repo1-bundle=y                         # bundle small files -> faster, fewer objects

# --- Repository 2: OFF-SITE object storage (S3-compatible) -------------------
# Disaster recovery copy. Use any S3-compatible target (AWS S3, Backblaze B2,
# Wasabi, MinIO, etc.). Encrypt at rest with a repo cipher.
repo2-type=s3
repo2-s3-endpoint=s3.ap-south-1.amazonaws.com      # CHANGE_ME (region near India)
repo2-s3-bucket=smarttds-pgbackup                  # CHANGE_ME
repo2-s3-region=ap-south-1                          # CHANGE_ME
repo2-s3-key=CHANGE_ME_S3_ACCESS_KEY
repo2-s3-key-secret=CHANGE_ME_S3_SECRET_KEY
repo2-path=/smarttds
repo2-cipher-type=aes-256-cbc
repo2-cipher-pass=CHANGE_ME_repo_encryption_passphrase
# ---- RETENTION POLICY (off-site): 7 daily + 4 weekly ----
# Achieved by tagging schedules (see cron in pg_basebackup_and_wal.sh notes /
# the runbook): a daily FULL keeps 7 fulls; weekly retention is honoured by
# count below. pgBackRest expires by COUNT, so:
repo2-retention-full=7                 # 7 daily full backups (1 week of dailies)
repo2-retention-full-type=count
repo2-retention-diff=4                 # ~4 weekly differentials
# For true "4 weekly" archival, also run a weekly full into an archive bucket or
# use repo2-retention-full-type=time with repo2-retention-full=35 (35 days).
repo2-retention-archive=7              # keep WAL needed to restore the 7 fulls
repo2-retention-archive-type=full

# --- Performance / safety -----------------------------------------------------
process-max=4                          # parallel compression/transfer (8 vCPU box)
compress-type=zst
compress-level=3
start-fast=y                           # immediate checkpoint so backup starts now
delta=y                                # delta restore: only copy changed files
archive-async=y                        # async WAL push/queue -> primary never stalls
archive-get-queue-max=1GB
spool-path=/var/spool/pgbackrest
backup-standby=y                       # take backups from the standby node
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# =============================================================================
# Stanza: smarttds  — describe EVERY cluster node so backups can run from the
# standby and so restores work after a failover. pg1 = node1, pg2 = node2.
# =============================================================================
[smarttds]
# --- node 1 ---
pg1-host=10.0.0.11                     # CHANGE_ME (omit pg1-host when running ON node1)
pg1-host-user=postgres
pg1-path=/var/lib/postgresql/16/main
pg1-port=5432

# --- node 2 (standby; lets backup-standby pick it) ---
pg2-host=10.0.0.12                     # CHANGE_ME
pg2-host-user=postgres
pg2-path=/var/lib/postgresql/16/main
pg2-port=5432

# =============================================================================
# OPERATIONS CHEAT-SHEET (run as the postgres user)
# -----------------------------------------------------------------------------
#   Create stanza (once, on the primary):
#       pgbackrest --stanza=smarttds stanza-create
#   Validate config / archiving:
#       pgbackrest --stanza=smarttds check
#   Backups (schedule via cron — see runbook):
#       pgbackrest --stanza=smarttds --type=full backup     # daily
#       pgbackrest --stanza=smarttds --type=diff backup     # e.g. every 6 h
#       pgbackrest --stanza=smarttds --type=incr backup     # hourly (cheap)
#   Inspect:
#       pgbackrest --stanza=smarttds info
#   PITR restore (recover to an exact moment — e.g. just before a bad bulk run):
#       pg_ctl stop                                          # stop the node
#       pgbackrest --stanza=smarttds --delta \
#         --type=time "--target=2026-06-02 14:30:00+05:30" \
#         --target-action=promote restore
#       pg_ctl start
#   Restore a specific FULL:
#       pgbackrest --stanza=smarttds --set=<backup-label> restore
#
# Suggested cron (off the standby; see PHASE4_HA_RUNBOOK.md):
#   0 1 * * *  full         (daily 01:00)  -> 7-daily retention
#   0 */6 * * * diff        (every 6 h)
#   30 * * * * incr         (hourly :30)
#   0 2 * * 0  full into archive bucket (weekly Sunday) for the "4 weekly" copies
# =============================================================================
